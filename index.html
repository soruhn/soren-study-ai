<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soren AI Study Helper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
            background: #f8f8f8;
        }

        .tab-button {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
        }

        .tab-button:hover {
            background: #e8e8e8;
        }

        .tab-button.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
            margin-bottom: -2px;
        }

        .content {
            padding: 30px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .button-group button {
            flex: 1;
        }

        .output-box {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            padding: 20px;
            margin-top: 20px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            position: relative;
        }

        .output-container {
            position: relative;
            padding-top: 45px;
        }

        .btn-copy {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: background 0.3s;
            z-index: 10;
        }

        .btn-copy:hover {
            background: #764ba2;
        }

        .btn-copy.copied {
            background: #27ae60;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            border-left: 4px solid #c33;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            border-left: 4px solid #3c3;
        }

        .session-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .session-item h3 {
            margin-bottom: 5px;
            color: #333;
        }

        .session-item p {
            margin: 5px 0;
            color: #666;
            font-size: 0.9em;
        }

        .session-item .content-preview {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 3px;
            max-height: 150px;
            overflow-y: auto;
        }

        .session-controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .btn-delete {
            background: #e74c3c;
            padding: 8px 15px;
            font-size: 0.9em;
            flex: 0;
        }

        .btn-delete:hover {
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .no-sessions {
            text-align: center;
            color: #999;
            padding: 30px;
        }

        .difficulty-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .difficulty-options label {
            margin-bottom: 0;
        }

        .difficulty-options input {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Soren AI Study Helper</h1>
            <p>Master any subject with AI-powered explanations and practice</p>
        </header>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('explain')">Explain Problems</button>
            <button class="tab-button" onclick="switchTab('practice')">Practice Questions</button>
            <button class="tab-button" onclick="switchTab('sessions')">Study Sessions</button>
        </div>

        <div class="content">
            <!-- Explain Tab -->
            <div id="explain" class="tab-content active">
                <h2>Get Help Understanding Problems</h2>
                <form id="explainForm">
                    <div class="form-group">
                        <label for="problemInput">Enter Your Problem:</label>
                        <textarea id="problemInput" placeholder="Paste the problem you need help with..." required></textarea>
                    </div>
                    <div class="button-group">
                        <button type="submit">Get Explanation</button>
                    </div>
                </form>
                <div class="loading" id="explainLoading">
                    <div class="spinner"></div>
                    <p>Generating explanation...</p>
                </div>
                <div id="explainOutput"></div>
            </div>

            <!-- Practice Tab -->
            <div id="practice" class="tab-content">
                <h2>Generate Practice Questions</h2>
                <form id="practiceForm">
                    <div class="form-group">
                        <label for="topicInput">Topic to Practice:</label>
                        <input type="text" id="topicInput" placeholder="e.g., Quadratic Equations, Photosynthesis, World War II..." required>
                    </div>
                    <div class="form-group">
                        <label>Difficulty Level:</label>
                        <select id="difficultySelect">
                            <option value="easy">Easy</option>
                            <option value="medium" selected>Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                    <div class="button-group">
                        <button type="submit">Generate Questions</button>
                    </div>
                </form>
                <div class="loading" id="practiceLoading">
                    <div class="spinner"></div>
                    <p>Generating practice questions...</p>
                </div>
                <div id="practiceOutput"></div>
            </div>

            <!-- Sessions Tab -->
            <div id="sessions" class="tab-content">
                <h2>Your Study Sessions</h2>
                <div id="sessionsList" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            // Load sessions when switching to sessions tab
            if (tabName === 'sessions') {
                loadSessions();
            }
        }

        // Explain Problem
        document.getElementById('explainForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const problem = document.getElementById('problemInput').value;
            const explainOutput = document.getElementById('explainOutput');
            const explainLoading = document.getElementById('explainLoading');

            explainOutput.innerHTML = '';
            explainLoading.style.display = 'block';

            try {
                const response = await fetch('/api/explain', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ problem })
                });

                if (!response.ok) {
                    throw new Error('Failed to get explanation');
                }

                const data = await response.json();
                explainLoading.style.display = 'none';
                
                if (data.error) {
                    explainOutput.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                } else {
                    explainOutput.innerHTML = `
                        <div class="output-container">
                            <button class="btn-copy" onclick="copyToClipboard(this, 'explanation')">Copy</button>
                            <div class="output-box" id="explanation">${escapeHtml(data.explanation)}</div>
                        </div>
                    `;
                    
                    // Auto-save this session
                    saveSession('Problem Explanation', data.explanation, problem);
                }
            } catch (error) {
                explainLoading.style.display = 'none';
                explainOutput.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        });

        // Generate Practice
        document.getElementById('practiceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const topic = document.getElementById('topicInput').value;
            const difficulty = document.getElementById('difficultySelect').value;
            const practiceOutput = document.getElementById('practiceOutput');
            const practiceLoading = document.getElementById('practiceLoading');

            practiceOutput.innerHTML = '';
            practiceLoading.style.display = 'block';

            try {
                const response = await fetch('/api/practice', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ topic, difficulty })
                });

                if (!response.ok) {
                    throw new Error('Failed to generate questions');
                }

                const data = await response.json();
                practiceLoading.style.display = 'none';

                if (data.error) {
                    practiceOutput.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                } else {
                    practiceOutput.innerHTML = `
                        <div class="output-container">
                            <button class="btn-copy" onclick="copyToClipboard(this, 'questions')">Copy</button>
                            <div class="output-box" id="questions">${escapeHtml(data.questions)}</div>
                        </div>
                    `;
                    
                    // Auto-save this session
                    saveSession(`${topic} (${difficulty})`, data.questions, '');
                }
            } catch (error) {
                practiceLoading.style.display = 'none';
                practiceOutput.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        });

        // Save Session
        async function saveSession(topic, content, notes) {
            try {
                await fetch('/api/save-session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ topic, content, notes })
                });
            } catch (error) {
                console.error('Failed to save session:', error);
            }
        }

        // Load Sessions
        async function loadSessions() {
            const sessionsList = document.getElementById('sessionsList');

            try {
                const response = await fetch('/api/sessions');
                if (!response.ok) {
                    throw new Error('Failed to load sessions');
                }

                const sessions = await response.json();

                if (sessions.length === 0) {
                    sessionsList.innerHTML = '<div class="no-sessions">No study sessions yet. Start by explaining a problem or generating practice questions!</div>';
                    return;
                }

                sessionsList.innerHTML = sessions.map(session => `
                    <div class="session-item">
                        <h3>${escapeHtml(session.topic)}</h3>
                        <p>📅 ${new Date(session.timestamp).toLocaleString()}</p>
                        <div class="content-preview">
                            ${escapeHtml(session.content.substring(0, 300))}${session.content.length > 300 ? '...' : ''}
                        </div>
                        ${session.notes ? `<p><strong>Notes:</strong> ${escapeHtml(session.notes)}</p>` : ''}
                        <div class="session-controls">
                            <button class="btn-delete" onclick="deleteSession(${session.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                sessionsList.innerHTML = `<div class="error">Error loading sessions: ${error.message}</div>`;
            }
        }

        // Delete Session
        async function deleteSession(sessionId) {
            if (!confirm('Are you sure you want to delete this session?')) {
                return;
            }

            try {
                const response = await fetch(`/api/sessions/${sessionId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error('Failed to delete session');
                }

                loadSessions();
            } catch (error) {
                alert('Error deleting session: ' + error.message);
            }
        }

        // Utility: Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Copy to Clipboard
        function copyToClipboard(button, elementId) {
            const element = document.getElementById(elementId);
            const text = element.textContent || element.innerText;
            
            navigator.clipboard.writeText(text).then(() => {
                // Change button appearance to indicate success
                button.textContent = '✓ Copied!';
                button.classList.add('copied');
                
                // Revert after 2 seconds
                setTimeout(() => {
                    button.textContent = 'Copy';
                    button.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                alert('Failed to copy to clipboard: ' + err);
            });
        }
    </script>
</body>
</html>
